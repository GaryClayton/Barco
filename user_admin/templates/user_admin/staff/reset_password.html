{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="card shadow-sm mx-auto" style="max-width: 600px;">
        <div class="card-body">
            <h2 class="fw-bold mb-4">Reset Password for {{ user.username }}</h2>
            <form method="post">
                {% csrf_token %}
                {% include 'user_admin/staff/_form.html' %}
                <button type="submit" class="btn btn-danger">Reset Password</button>
                <a href="{% url 'staff_user_list' %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock content %}
