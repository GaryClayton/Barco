<h2 style="font-family: sans-serif; margin-bottom: 1rem;">Upload Your Files</h2>

<form method="POST" enctype="multipart/form-data"
      style="padding: 1.5rem; border: 1px solid #ddd; border-radius: 8px; max-width: 400px; background: #fafafa;">
    {% csrf_token %}

    <div style="margin-bottom: 1rem;">
        <label><strong>File 1</strong></label><br>
        {{ form.file1 }}
    </div>

    <div style="margin-bottom: 1rem;">
        <label><strong>File 2</strong></label><br>
        {{ form.file2 }}
    </div>

    <div style="margin-bottom: 1rem;">
        <label><strong>Log File</strong></label><br>
        {{ form.file3 }}
    </div>

    <button type="submit"
            style="padding: 0.5rem 1rem; background: #007bff; color: white; border: none; border-radius: 4px;">
        Upload
    </button>
</form>
